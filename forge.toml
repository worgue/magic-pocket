kits = ["core", "uv", "just", "postgres", "docker", "infra", "claude", "mysql", "redis", "depot", "rust"]
aws_region = "ap-northeast-1"

[git]
github_token_type = "app"

[[mounts]]
type = "overlay"
path = ".venv"
managed = "uv"

[[mounts]]
type = "overlay"
path = "node_modules"
managed = "bun"

[[mounts]]
type = "overlay"
path = "example-tidb/.venv"

[[mounts]]
type = "overlay"
path = "example-neon/.venv"
[[mounts]]
type = "overlay"
path = ".forge/workspace"
managed = "forge"
[[mounts]]
type = "overlay"
path = "target"
managed = "rust"
[[mounts]]
type = "inject"
source = ".forge/vm/.claude/settings.local.json"
target = ".claude/settings.local.json"
is_file = true
managed = "claude"

[llm.aws.env_aliases]
POCKET_PERMISSIONS_BOUNDARY_ARN = "FORGE_PERMISSIONS_BOUNDARY_ARN"

[security]
nesting = true
