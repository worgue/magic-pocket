[project]
site_name = "Magic Pocket"
site_description = "magic-pocketは、DjangoプロジェクトをAWS Lambdaにデプロイするためのツールです。"
site_url = "https://worgue.github.io/magic-pocket"
repo_url = "https://github.com/worgue/magic-pocket"

nav = [
  { "Home" = "index.md" },
  { "はじめに" = "getting-started.md" },
  { "ガイド" = [
    { "設定ファイル (pocket.toml)" = "guide/configuration.md" },
    { "コマンドライン (CLI)" = "guide/cli.md" },
    { "実行環境とDjango連携" = "guide/runtime.md" },
    { "ベストプラクティス" = "guide/best-practices.md" },
    { "コールドスタート" = "guide/cold-start.md" },
  ] },
  { "Changelog" = "changelog.md" },
  { "旧ドキュメント" = [
    { "Intro" = "old/index.md" },
    { "概要" = "old/features/outline.md" },
    { "pocket.toml" = "old/features/pocket-toml.md" },
    { "コマンドライン" = "old/features/cli.md" },
    { "実行環境" = "old/features/runtime.md" },
    { "Get Started" = "old/get_started.md" },
    { "Tutorial - Simple Project" = "old/tutorial/simple.md" },
  ] },
]

[project.theme]
language = "ja"
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.top",
  "navigation.footer",
  "navigation.expand",
  "navigation.sections",
  "content.code.annotate",
  "content.code.copy",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "ダークモードに切り替え"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "ライトモードに切り替え"

[project.plugins.search]
lang = "ja"

[project.markdown_extensions.admonition]
[project.markdown_extensions."pymdownx.details"]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.def_list]
[project.markdown_extensions."pymdownx.inlinehilite"]
[project.markdown_extensions."pymdownx.snippets"]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions."pymdownx.superfences"]
custom_fences = [
  { name = "mermaid", class = "mermaid" },
]

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true
