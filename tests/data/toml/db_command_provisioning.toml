[general]
region = "ap-southeast-1"
project_name = "testprj"
stages = ["dev"]

[tidb]
provisioning = "command"

[neon]
project_name = "dev-testprj"
provisioning = "command"

[upstash]
provisioning = "command"

[awscontainer]
dockerfile_path = "tests/sampleprj/Dockerfile"

[awscontainer.handlers.wsgi]
command = "pocket.django.lambda_handlers.wsgi_handler"

# provisioning = "command" は「pocket は provider API を叩かず、事前 provision 済みの
# URL を読むだけ」なので、managed (pocket が provisioning する) ではなく user の
# stored mode で宣言するのが対の設定
[awscontainer.secrets.user]
DATABASE_URL = { type = "tidb_database_url" }
