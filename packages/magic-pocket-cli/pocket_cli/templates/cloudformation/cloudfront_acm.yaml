AWSTemplateFormatVersion: "2010-09-09"
Description: ACM certificates for CloudFront (us-east-1)

Resources:
  # {% if domain %}
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: "{{ domain }}"
      # {% if redirect_from %}
      # redirect_from ドメインは専用 cert ではなくメイン cert の SAN に載せる。
      # 301 は CloudFront Function で返すため、redirect ドメインもこの配信の
      # Alias になり、同じ証明書で終端できる。
      SubjectAlternativeNames:
        # {% for rf in redirect_from %}
        - "{{ rf.domain }}"
        # {% endfor %}
      # {% endif %}
      DomainValidationOptions:
        - DomainName: "{{ domain }}"
          HostedZoneId: "{{ hosted_zone_id }}"
        # {% for rf in redirect_from %}
        - DomainName: "{{ rf.domain }}"
          HostedZoneId: "{{ rf.hosted_zone_id }}"
        # {% endfor %}
      Tags:
        - Key: Name
          Value: "{{ resource_prefix }}cloudfront-cert"
      ValidationMethod: DNS
  # {% endif %}

Outputs:
  # {% if domain %}
  CertificateArn:
    Value:
      Ref: Certificate
  # {% endif %}
